name: SonarCloud Analysis

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lambda-tests-and-sonar:
    name: Lambda Tests & SonarCloud
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0  # Full git history for SonarCloud blame

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            lambda/scheduler/requirements.txt
            lambda/purchaser/requirements.txt
            lambda/reporter/requirements.txt

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --only-binary :all: -r lambda/scheduler/requirements.txt
          pip install --only-binary :all: -r lambda/purchaser/requirements.txt
          pip install --only-binary :all: -r lambda/reporter/requirements.txt

      - name: Run all Lambda tests with coverage
        env:
          PYTHONPATH: ${{ github.workspace }}/lambda
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "::group::Scheduler Tests"
          cd lambda/scheduler && pytest && cd ../..
          echo "::endgroup::"

          echo "::group::Purchaser Tests"
          cd lambda/purchaser && pytest && cd ../..
          echo "::endgroup::"

          echo "::group::Reporter Tests"
          cd lambda/reporter && pytest && cd ../..
          echo "::endgroup::"

      - name: Verify Coverage Files
        run: |
          echo "Coverage files:"
          find lambda -name "coverage.xml" -exec echo "  {}" \;

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@ba3875ecf642b2129de2b589510c81a8b53dbf4e # master
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.qualitygate.wait=false
            -Dsonar.verbose=false
