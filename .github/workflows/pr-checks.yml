name: PR Checks

on:
  pull_request:
    branches:
      - main
      - develop
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # Stage 1: Fast validation checks (run first)
  terraform-validation:
    name: Terraform Format and Validate
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.11.0"

      - name: Terraform Format Check
        id: fmt
        run: |
          # Format check for .tf files only (tftest.hcl files are not supported by terraform fmt)
          find . -name "*.tf" -not -path "*/.terraform/*" -exec terraform fmt -check {} +
        continue-on-error: false

      - name: Terraform Init
        id: init
        run: terraform init -backend=false
        continue-on-error: false

      - name: Terraform Validate
        id: validate
        run: terraform validate
        continue-on-error: false

      - name: Comment PR with Results
        if: false # Disabled: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Validation Failed

            **Format Check:** \`${{ steps.fmt.outcome }}\`
            **Initialization:** \`${{ steps.init.outcome }}\`
            **Validation:** \`${{ steps.validate.outcome }}\`

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  tfsec-scan:
    name: tfsec Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@b466648d6e39e7c75324f25d83891162a721f2d6 # v1.0.3
        with:
          soft_fail: false
          format: default
          github_token: ${{ secrets.GITHUB_TOKEN }}
          additional_args: --minimum-severity HIGH --exclude aws-s3-encryption-customer-key,aws-sqs-queue-encryption-use-cmk,aws-iam-no-policy-wildcards

      - name: Run tfsec with SARIF output
        if: always()
        uses: aquasecurity/tfsec-sarif-action@21ded20e8ca120cd9d3d6ab04ef746477542a608 # v0.1.4
        with:
          sarif_file: tfsec-results.sarif
          tfsec_args: --minimum-severity HIGH --exclude aws-s3-encryption-customer-key,aws-sqs-queue-encryption-use-cmk,aws-iam-no-policy-wildcards
        continue-on-error: true

      - name: Upload SARIF file
        if: always() && hashFiles('tfsec-results.sarif') != ''
        uses: github/codeql-action/upload-sarif@c10b8064de6f491fea524254123dbe5e09572f13 # v4
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

      - name: Comment PR with Security Issues
        if: false # Disabled: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Security Scan Failed

            **tfsec found HIGH or CRITICAL security issues in your Terraform code.**

            Please review the security findings above and address them before merging.

            Common fixes:
            - Enable encryption for resources
            - Restrict security group rules
            - Enable logging and monitoring
            - Use secure default configurations

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  # Stage 1: Fast validation checks (run first)
  lint:
    name: Python Linting
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'

      - name: Install ruff
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run ruff check
        run: |
          ruff check lambda/

      - name: Run ruff format check
        run: |
          ruff format --check lambda/

      - name: Comment PR with Linting Results
        if: false # Disabled: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Python Linting Failed

            **Ruff linting or formatting checks failed.**

            Please run the following commands locally to fix:
            - \`ruff check --fix lambda/\`
            - \`ruff format lambda/\`

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

  docs-check:
    name: Terraform Docs Check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Setup terraform-docs
        run: |
          curl -sSLo terraform-docs.tar.gz https://terraform-docs.io/dl/v0.19.0/terraform-docs-v0.19.0-$(uname)-amd64.tar.gz
          tar -xzf terraform-docs.tar.gz terraform-docs
          chmod +x terraform-docs
          sudo mv terraform-docs /usr/local/bin/
      - name: Check docs are up-to-date
        run: terraform-docs . --output-check

  # Stage 2: Lambda tests (runs after Stage 1 passes)
  lambda-tests:
    needs: [terraform-validation, tfsec-scan, lint, docs-check]
    name: Lambda Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: |
            lambda/scheduler/requirements.txt
            lambda/purchaser/requirements.txt
            lambda/reporter/requirements.txt

      - name: Install all dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lambda/scheduler/requirements.txt
          pip install -r lambda/purchaser/requirements.txt
          pip install -r lambda/reporter/requirements.txt

      - name: Run all Lambda tests
        env:
          PYTHONPATH: ${{ github.workspace }}/lambda
          AWS_DEFAULT_REGION: us-east-1
        run: |
          echo "::group::Scheduler Tests"
          cd lambda/scheduler && pytest && cd ../..
          echo "::endgroup::"

          echo "::group::Purchaser Tests"
          cd lambda/purchaser && pytest && cd ../..
          echo "::endgroup::"

          echo "::group::Reporter Tests"
          cd lambda/reporter && pytest && cd ../..
          echo "::endgroup::"

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2 # v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./lambda/scheduler/coverage.xml,./lambda/purchaser/coverage.xml,./lambda/reporter/coverage.xml
          fail_ci_if_error: false

  # Stage 3: Terraform unit tests (runs after Lambda tests complete successfully)
  terraform-unit-tests:
    name: Terraform Unit Tests
    runs-on: ubuntu-latest
    needs: [terraform-validation, tfsec-scan, lint, docs-check, lambda-tests]
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: "1.11.0"

      - name: Verify Terraform Version
        run: |
          terraform version
          terraform version | grep -E "v1\.1[1-9]|v1\.[2-9][0-9]|v[2-9]" || (echo "ERROR: Terraform 1.11+ required for override_during support" && exit 1)

      - name: Verify AWS Credentials NOT Set
        run: |
          if [ -n "$AWS_ACCESS_KEY_ID" ] || [ -n "$AWS_SECRET_ACCESS_KEY" ]; then
            echo "ERROR: AWS credentials should not be set for these tests"
            exit 1
          fi

      - name: Initialize Terraform
        run: terraform init

      - name: Run all Terraform Unit Tests
        run: |
          FAILED=0
          for test_file in cloudwatch eventbridge iam s3 sns sqs sqs_policy variables; do
            echo "::group::$test_file"
            if terraform test terraform-tests/unit/${test_file}.tftest.hcl; then
              echo "✓ ${test_file} passed"
            else
              echo "✗ ${test_file} failed"
              FAILED=1
            fi
            echo "::endgroup::"
          done
          exit $FAILED

  # Stage 2b: Terraform integration tests (runs after fast checks, parallel with Lambda tests)
  terraform-integration-tests:
    name: Terraform Integration Tests
    if: github.event.pull_request.draft != true
    runs-on: ubuntu-latest
    needs: [terraform-validation, tfsec-scan, lint, docs-check]
    environment: ${{ github.event_name == 'pull_request' && 'aws-integration' || 'aws-integration-auto' }}
    concurrency:
      group: aws-integration-tests
      cancel-in-progress: false
    timeout-minutes: 30
    permissions:
      contents: read

    env:
      AWS_DEFAULT_REGION: us-east-1
      GO_VERSION: '1.24'
      TERRAFORM_VERSION: '1.11.0'

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: terraform-tests/integration/go.mod

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@5e8dbf3c6d9deaf4193ca7a8fb23f2ac83bb6c85 # v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_DEFAULT_REGION }}

      - name: Pre-Test Cleanup
        working-directory: terraform-tests/integration
        run: |
          echo "Cleaning up any orphaned resources before tests..."
          go mod download
          go test -v -timeout 10m -run TestCleanupAllOrphanedResources || true

      - name: Install Terratest Dependencies
        working-directory: terraform-tests/integration
        run: |
          go mod tidy
          go mod download
          go mod verify

      - name: Run Terratest Integration Tests
        working-directory: terraform-tests/integration
        run: |
          go test -v -timeout 30m -parallel 1 -failfast -skip TestCleanupAllOrphanedResources
        env:
          TF_VAR_environment: ci-test
          TF_VAR_project_name: sp-autopilot-ci

      - name: Cleanup AWS Resources
        if: always()
        working-directory: terraform-tests/integration
        run: |
          echo "Cleaning up any remaining test resources..."
          go test -v -timeout 10m -run TestCleanupAllOrphanedResources || true

      - name: Comment PR with Test Results
        if: false # Disabled: github.event_name == 'pull_request' && failure()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const output = `#### Terraform Integration Tests Failed

            **Terratest integration tests failed.**

            Please review the test results above and fix any failing tests.

            *Pushed by: @${{ github.actor }}, Action: \`${{ github.event_name }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });
